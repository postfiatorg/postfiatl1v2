name: replay-profile-rotation

on:
  workflow_dispatch:
    inputs:
      packet_limit:
        description: "Packet limit for controlled fixture smoke; leave empty for full packet set."
        required: false
        default: "24"
      repeats:
        description: "Repeat count per profile."
        required: false
        default: "2"

permissions:
  contents: read

jobs:
  fixture-rotation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Run controlled fixture rotation
        shell: bash
        run: |
          set -euo pipefail
          args=(
            run-fixture
            --run-id "github-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            --repeats "${{ inputs.repeats }}"
            --overwrite
          )
          if [ -n "${{ inputs.packet_limit }}" ]; then
            args+=(--limit-packets "${{ inputs.packet_limit }}")
          fi
          scripts/ai-replay-profile-rotation "${args[@]}"
      - name: Verify controlled fixture rotation
        shell: bash
        run: |
          set -euo pipefail
          report="reports/replay-profile-rotation/github-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}/rotation_report.json"
          scripts/ai-replay-profile-rotation verify --report "$report"
          scripts/ai-replay-profile-rotation github-summary \
            --report "$report" \
            --github-step-summary "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: replay-profile-rotation-report
          path: reports/replay-profile-rotation/github-${{ github.run_id }}-${{ github.run_attempt }}
