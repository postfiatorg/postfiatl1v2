name: rust-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal --component clippy,rustfmt
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo check
        run: cargo check --workspace --all-targets --locked
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal
      - name: cargo test
        run: |
          cargo test --workspace --locked
          cargo test --locked -p postfiat-node --bin postfiat-node \
            fastswap_service::tests::persistent_wallet_driver_meets_isolated_warm_latency_gate \
            -- --ignored --exact --nocapture
