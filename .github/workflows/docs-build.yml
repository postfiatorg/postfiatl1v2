name: docs-build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: python -m pip install --disable-pip-version-check --require-hashes -r requirements-docs.txt
      - run: scripts/docs-site-evidence-index
      - run: scripts/docs-site-redaction-check
      - run: scripts/test-whitepaper-implementation-boundaries
      - run: scripts/test-public-doc-links
      - run: scripts/public-doc-links
      - run: mkdocs build --strict
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: postfiat-docs-site
          path: site
