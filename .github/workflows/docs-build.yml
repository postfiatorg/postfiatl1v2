name: docs-build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: python -m pip install --disable-pip-version-check --require-hashes -r requirements-docs.txt
      - run: scripts/docs-site-evidence-index
      - run: scripts/docs-site-redaction-check
      - run: scripts/test-whitepaper-implementation-boundaries
      - run: scripts/test-public-doc-links
      - run: scripts/public-doc-links
      - run: mkdocs build --strict
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: postfiat-docs-site
          path: site
