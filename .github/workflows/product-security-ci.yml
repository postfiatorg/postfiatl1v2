name: product-security-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-tree-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20.20.2"
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Secret-scanner regression
        run: |
          scripts/test-public-secret-scan
          scripts/test-verify-publication-candidate
      - name: Scan the exact tracked publication tree
        run: scripts/public-secret-scan
      - name: Reject live infrastructure and unsafe TLS runtime defaults
        run: |
          scripts/test-public-runtime-default-scan
          scripts/public-runtime-default-scan
          scripts/test-public-source-portability
      - name: Verify public RPC exposure and authorization classification
        run: scripts/test-rpc-method-inventory
      - name: Verify binary and media artifact disposition
        run: scripts/test-public-artifact-policy
      - name: Verify consensus determinism surface
        run: scripts/test-consensus-determinism-surface
      - name: Verify cryptographic call-site policy
        run: |
          scripts/test-crypto-callsite-policy
          scripts/test-proof-public-input-inventory
      - name: Verify repository redaction fixtures
        run: |
          node scripts/test-navswap-redaction-check.mjs
          node scripts/navswap-redaction-check.mjs --repo-only
      - name: Verify P0/P1 closure-table coverage
        run: scripts/test-productionization-closure-table

  rust-supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.95.0 --profile minimal
      - uses: EmbarkStudios/cargo-deny-action@f9cc7aa250dec5698b425dc01fbf0d745fcd1b78 # v2.0.13
        with:
          command: check
      - name: Verify vendored Halo2 source and licenses
        run: scripts/verify-vendored-halo2
      - name: Generate deterministic CycloneDX SBOM
        run: |
          scripts/test-generate-cargo-sbom
          scripts/generate-cargo-sbom postfiat-cargo-sbom.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: postfiat-cargo-sbom
          path: postfiat-cargo-sbom.cdx.json

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt
      - name: Install hash-locked test dependencies
        run: python -m pip install --require-hashes -r requirements-test.txt
      - name: Python SDK and operations regressions
        env:
          PYTHONPATH: python
        run: python -m pytest python/tests

  wallet-and-proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20.20.2"
          cache: npm
          cache-dependency-path: |
            wallet-web/package-lock.json
            wallet-proxy/package-lock.json
      - name: Wallet proxy dependencies and regressions
        working-directory: wallet-proxy
        run: |
          npm ci
          npm audit --audit-level=moderate
          npm test
      - name: Browser wallet dependencies, tests, and static build
        working-directory: wallet-web
        run: |
          npm ci
          npm audit --audit-level=moderate
          npm test
          npm run build

  evm-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: foundry-rs/foundry-toolchain@82dee4ba654bd2146511f85f0d013af94670c4de # v1.4.0
        with:
          version: v1.7.1
      - name: Offline contract suite
        working-directory: crates/ethereum-contracts
        run: forge test --no-match-path test/PFTLUniswapOfficialFork.t.sol
      - name: Official fork test cannot silently pass offline
        working-directory: crates/ethereum-contracts
        shell: bash
        run: |
          set -o pipefail
          if env -u ETHEREUM_MAINNET_RPC_URL forge test --match-path test/PFTLUniswapOfficialFork.t.sol -vv 2>&1 | tee /tmp/official-fork-negative.log; then
            echo "official fork test unexpectedly passed without an RPC URL" >&2
            exit 1
          fi
          grep -F 'environment variable "ETHEREUM_MAINNET_RPC_URL" not found' /tmp/official-fork-negative.log

  official-mainnet-fork:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      ETHEREUM_MAINNET_RPC_URL: ${{ secrets.ETHEREUM_MAINNET_RPC_URL }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: foundry-rs/foundry-toolchain@82dee4ba654bd2146511f85f0d013af94670c4de # v1.4.0
        with:
          version: v1.7.1
      - name: Require configured archive RPC
        run: test -n "$ETHEREUM_MAINNET_RPC_URL"
      - name: Verify official deployments at the pinned mainnet block
        working-directory: crates/ethereum-contracts
        run: forge test --match-path test/PFTLUniswapOfficialFork.t.sol -vv
