site_name: PostFiat L1 Engineering Docs
site_description: Engineering documentation for the PostFiat L1 controlled-testnet implementation.
site_url: !ENV [POSTFIAT_DOCS_SITE_URL, "http://127.0.0.1:8088/"]
repo_url: https://github.com/postfiatorg/postfiatl1v2
repo_name: postfiatl1v2
docs_dir: docs
site_dir: site
use_directory_urls: true
exclude_docs: |
  archive/**
  examples/**
  references/**
  research-requests/**
  review/**
  specs/**
  status/**
  ai-handoff.md
  cut.md
  navcoin-sp1-verifier.md
  whip-harness.md
  whitepaper1_update.md
  governance/*/**
  governance/*.json
  governance/ai_governance_red_team_plan.md
  governance/cobalt-amendment-lifecycle.md
  governance/cobalt-canonical-mode.md
  governance/cobalt-controlled-testnet-plan.md
  governance/full-cobalt-shipping-plan.md
not_in_nav: |
  governance/deterministic-governance-agent-bounded-*.md
  governance/deterministic-governance-agent-gate-*.md
  governance/deterministic-governance-agent-governance-queue-handoff.md
  governance/deterministic-governance-agent-implementation-*.md
  governance/deterministic-governance-agent-post-review-decision.md
  governance/deterministic-governance-agent-queue-decision.md
  governance/deterministic-governance-agent-release-handoff.md
  governance/deterministic-governance-agent-review-signoff.md
  governance/model-selection-governance-requirement.md
  governance/qwen-cobalt-live-collector-readiness-summary.md
  governance/qwen-cobalt-operator-readiness-summary.md
  governance/validator-evidence-collector-writer.md
  governance/validator-evidence-conflict-set.md
  governance/validator-evidence-field-weight-policy.md
  governance/validator-evidence-open-question-disposition.md
  governance/validator-evidence-operator-*.md
  governance/validator-evidence-public-url-domain-gate.md
  governance/validator-evidence-qwen-*.md
  governance/validator-evidence-source-authorization.md

theme:
  name: material
  language: en
  font: false
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      accent: teal

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - assets/javascripts/copy-whitepaper-markdown.js

extra_css:
  - assets/stylesheets/copy-whitepaper-markdown.css

