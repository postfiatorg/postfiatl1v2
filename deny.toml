[graph]
targets = [
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "wasm32-unknown-unknown",
]
all-features = true

[advisories]
ignore = [
  { id = "RUSTSEC-2021-0139", reason = "ansi_term is logging-only through SP1 slop-utils/tracing-forest; active Groth16 verification does not call the logger. Remove with the next SP1 release by 2026-08-31." },
  { id = "RUSTSEC-2025-0141", reason = "bincode is inherited from SP1 6.3.1. The active Groth16 verifier uses bounded proof/public-value inputs and known-good vectors; compressed proof deserialization is not exposed. Replace with the upstream SP1 migration by 2026-08-31." },
  { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2 is a compile-time-only Orchard 0.14/getset dependency. Orchard 0.15 changes consensus proof encodings and requires a separately gated migration; migrate by 2026-08-31." },
]

[licenses]
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]

[licenses.private]
ignore = false

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow-workspace = true
deny = [
  { crate = "crossbeam-epoch@=0.9.18", reason = "RUSTSEC-2026-0204" },
  { crate = "spin@=0.9.8", reason = "version is yanked; 0.9.9 is the compatible replacement" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
